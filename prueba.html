<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Div Scrollable con Iframe</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .scroll-div {
      width: 100%;
      height: 100vh;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16);
      margin: 1.6em 0 0.9em;
      border-radius: 8px;
      position: relative;
      touch-action: pan-y;
    }
    .scroll-content {
      min-height: 150vh;
    }
    .iframe-container {
      position: relative;
      width: 100%;
      padding-top: 314.5370%;
    }
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: auto;
    }
    .touch-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: auto;
      background: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="scroll-div" id="scrollDiv">
    <div class="scroll-content">
      <div class="iframe-container">
        <div class="touch-overlay" id="touchOverlay"></div>
        <iframe loading="lazy"
          src="https://www.canva.com/design/DAGn2moUrag/JdOGBcglHYQadYPBtXAcDQ/view?embed"
          allowfullscreen="allowfullscreen" allow="fullscreen">
        </iframe>
      </div>
    </div>
  </div>

  <script>
    const scrollDiv = document.getElementById('scrollDiv');
    const touchOverlay = document.getElementById('touchOverlay');
    const iframe = scrollDiv.querySelector('iframe');
    let startY = 0;
    let isScrolling = false;
    let touchStartTime = 0;
    let touchStartX = 0;
    let touchStartY = 0;

    touchOverlay.addEventListener('touchstart', (e) => {
      startY = e.touches[0].clientY;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchStartTime = new Date().getTime();
      isScrolling = true;
      e.preventDefault();
    });

    touchOverlay.addEventListener('touchmove', (e) => {
      if (!isScrolling) return;
      const currentY = e.touches[0].clientY;
      const deltaY = startY - currentY;
      scrollDiv.scrollTop += deltaY;
      startY = currentY;
      e.preventDefault();
    });

    touchOverlay.addEventListener('touchend', (e) => {
      isScrolling = false;
      const touchEndTime = new Date().getTime();
      const touchDuration = touchEndTime - touchStartTime;
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      const distanceMoved = Math.sqrt(
        Math.pow(touchEndX - touchStartX, 2) + Math.pow(touchEndY - touchStartY, 2)
      );

      // Detecta un tap rápido (toque corto y sin movimiento)
      if (touchDuration < 200 && distanceMoved < 5) {
        // Desactiva la capa para permitir clic nativo
        touchOverlay.style.pointerEvents = 'none';
        // Deja que el iframe maneje el clic nativamente
        setTimeout(() => {
          touchOverlay.style.pointerEvents = 'auto';
        }, 50);
      }
      e.preventDefault();
    });
  </script>
</body>
</html>
