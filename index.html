<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Clover Digital https://cloverdigital.vercel.app/">
  <title>Invitacion-Martina-XV</title>
  <!-- Favicon (emoji como marcador, reemplaza con tu propio favicon) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎉</text></svg>">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f0f0f0;
    }
    .audio-control {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }
    .audio-button {
      width: 40px;
      height: 40px;
      background-color: #ecc8ca;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s;
    }
    .audio-button:hover {
      background-color: #ecc8ca;
    }
    .audio-button svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
  </style>
</head>
<body>
  <!-- Canva Embed sin allowfullscreen redundante -->
  <div style="position: relative; width: 100%; height: 0; padding-top: 314.5370%; padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden; border-radius: 8px; will-change: transform;">
    <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0; margin: 0;"
      src="https://www.canva.com/design/DAGn2moUrag/JdOGBcglHYQadYPBtXAcDQ/view?embed"
      allow="fullscreen; autoplay"
      sandbox="allow-same-origin allow-scripts allow-popups">
    </iframe>
  </div>

  <!-- Control de audio -->
  <div class="audio-control">
    <button id="audio-button" class="audio-button">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
  </div>

  <!-- Audio -->
  <audio id="background-music" loop>
    <source src="music.mp3" type="audio/mpeg">
    Tu navegador no soporta el elemento de audio.
  </audio>

  <script>
    const audio = document.getElementById('background-music');
    const audioButton = document.getElementById('audio-button');

    const playIcon = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    const pauseIcon = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>';

    // Intentar reproducción automática
    audio.volume = 0.5;
    audio.play().then(() => {
      audioButton.innerHTML = pauseIcon;
    }).catch((error) => {
      console.log('La reproducción automática falló:', error);
      audioButton.innerHTML = playIcon;
    });

    // Controlar audio con el botón
    audioButton.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().then(() => {
          audioButton.innerHTML = pauseIcon;
        }).catch((error) => {
          console.log('Error al reproducir:', error);
        });
      } else {
        audio.pause();
        audioButton.innerHTML = playIcon;
      }
    });
  </script>
</body>
</html>
