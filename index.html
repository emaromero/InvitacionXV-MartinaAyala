<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="author" content="Clover Digital https://cloverdigital.vercel.app/">
  <meta name="description" content="Te invito a celebrar mis quince años! 🎉">
  <meta property="og:title" content="Invitación a los XV de Martina">
  <meta property="og:description" content="Te invito a celebrar mis quince años! 🎉">
  <meta property="og:image" content="/images/invitacion.jpg">
  <meta property="og:url" content="https://tuproyecto.vercel.app">
  <meta property="og:type" content="website">
  <title>Invitacion-Martina-XV</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎉</text></svg>">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      overflow-x: hidden;
      overflow-y: auto; /* Habilitar scroll vertical */
    }
    body {
      min-height: 100vh; /* Permitir que el body crezca */
    }
    .pdf-container {
      position: relative;
      max-width: 800px;
      width: 100%;
      margin: 1.6em auto;
      box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16);
      border-radius: 8px;
      overflow: hidden;
      padding-top: 141.4286%; /* Proporción aproximada para A4 (sqrt(2):1) */
    }
    .pdf-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .audio-control {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }
    .audio-button {
      width: 40px;
      height: 40px;
      background-color: #ecc8ca;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s;
    }
    .audio-button:hover {
      background-color: #d8b4b6;
    }
    .audio-button svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
    @media (max-width: 768px) {
      .pdf-container {
        margin: 1.6em 0;
      }
    }
  </style>
</head>
<body>
  <div class="pdf-container">
    <iframe src="Invitacion-Martina-XV.pdf" allowfullscreen></iframe>
  </div>

  <div class="audio-control">
    <button id="audio-button" class="audio-button">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
  </div>

  <audio id="background-music" loop>
    <source src="music.mp3" type="audio/mpeg">
    Tu navegador no soporta el elemento de audio.
  </audio>

  <script>
    const audio = document.getElementById('background-music');
    const audioButton = document.getElementById('audio-button');

    const playIcon = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    const pauseIcon = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>';

    audio.volume = 0.5;
    audio.play().then(() => {
      audioButton.innerHTML = pauseIcon;
    }).catch(error => {
      console.log('La reproducción automática falló:', error);
      audioButton.innerHTML = playIcon;
    });

    audioButton.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().then(() => {
          audioButton.innerHTML = pauseIcon;
        }).catch(error => {
          console.log('Error al reproducir:', error);
        });
      } else {
        audio.pause();
        audioButton.innerHTML = playIcon;
      }
    });
  </script>
</body>
</html>
